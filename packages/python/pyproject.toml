[project]
name = "friday-agent-sdk"
version = "0.1.0"
description = "Python SDK for authoring Friday agents — call LLMs, HTTP, and MCP tools without managing keys."
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.12"
authors = [{ name = "Tempest Labs, Inc.", email = "security@hellofriday.ai" }]
keywords = ["friday", "agent", "agent-sdk", "ai", "ai-agents", "llm", "mcp"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Typing :: Typed",
]
dependencies = ["nats-py>=2.9.0"]

[project.urls]
Homepage = "https://github.com/friday-platform/agent-sdk"
Documentation = "https://docs.hellofriday.ai/"
Repository = "https://github.com/friday-platform/agent-sdk"
Issues = "https://github.com/friday-platform/agent-sdk/issues"
Changelog = "https://github.com/friday-platform/agent-sdk/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["friday_agent_sdk"]

[tool.hatch.build.targets.sdist]
include = ["friday_agent_sdk", "README.md", "LICENSE"]

[tool.ruff]
target-version = "py312"
line-length = 125

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = ["pytest>=9.0.3", "ruff>=0.15.12"]
