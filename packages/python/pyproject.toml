[project]
name = "friday-agent-sdk"
version = "0.1.0"
description = "Python SDK for authoring Friday agents — call LLMs, HTTP, and MCP tools without managing keys."
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.12"
authors = [{ name = "Tempest Labs, Inc.", email = "security@hellofriday.ai" }]
keywords = ["friday", "agent", "agent-sdk", "ai", "ai-agents", "llm", "mcp"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Typing :: Typed",
]
dependencies = ["nats-py>=2.9.0"]

[project.urls]
Homepage = "https://github.com/friday-platform/agent-sdk"
Documentation = "https://docs.hellofriday.ai/"
Repository = "https://github.com/friday-platform/agent-sdk"
Issues = "https://github.com/friday-platform/agent-sdk/issues"
Changelog = "https://github.com/friday-platform/agent-sdk/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["friday_agent_sdk"]

[tool.hatch.build.targets.sdist]
include = ["friday_agent_sdk", "README.md", "LICENSE"]

[tool.ruff]
target-version = "py312"
line-length = 125

[tool.ruff.lint]
# Adding a category should be a deliberate choice — every PR has to pass these.
select = [
  "E", # pycodestyle errors
  "W", # pycodestyle warnings
  "F", # pyflakes
  "I", # isort
  "B", # flake8-bugbear (likely-bug patterns)
  "UP", # pyupgrade (modernize for the 3.12+ baseline)
  "RUF", # ruff-specific rules
  "SIM", # flake8-simplify
]

[tool.mypy]
python_version = "3.12"
files = ["friday_agent_sdk"]
# nats-py and other dependencies don't ship type stubs; treat their return
# values as Any rather than failing the build.
ignore_missing_imports = true
check_untyped_defs = true
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_optional = true

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = ["mypy>=1.13", "pytest>=9.0.3", "ruff>=0.15.12"]
