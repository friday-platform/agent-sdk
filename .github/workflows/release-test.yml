name: Release (TestPyPI dry-run)

# Manual dry-run publishing to TestPyPI. Triggered by:
#   - any push to a tag matching `v*-test*` (e.g. v0.1.1-test1)
#   - workflow_dispatch (run from the Actions tab without a tag)
#
# Behaves like release.yml but publishes to test.pypi.org. Does NOT
# create a GitHub release. Use this to validate packaging metadata,
# OIDC trusted-publishing config, and the build + upload pipeline
# without burning a real version number on PyPI.
#
# Setup required (one-time):
#   1. Trusted Publisher on https://test.pypi.org/manage/account/publishing/
#      with the same project/owner/repo, workflow=release-test.yml,
#      environment=testpypi.
#   2. GitHub environment named `testpypi` on the repo. Restricting it
#      to the v*-test* tag pattern is recommended.

on:
  push:
    tags:
      - "v*-test*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-test:
    name: Build + publish to TestPyPI
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/friday-agent-sdk
    permissions:
      id-token: write # OIDC trusted publishing
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      # When triggered by tag push, verify the tag matches in-tree versions.
      # workflow_dispatch runs skip this — you're explicitly opting into a
      # dry-run from whatever's on the branch.
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: packages/python
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          # Strip any -test* suffix so v0.1.1-test1 matches package version 0.1.1.
          TAG_BASE="${TAG%-test*}"
          PYPROJECT=$(grep -E '^version = "' pyproject.toml | sed -E 's/.*"(.*)"/\1/')
          INIT=$(grep -E '^__version__ = "' friday_agent_sdk/__init__.py | sed -E 's/.*"(.*)"/\1/')
          echo "tag=$TAG (base=$TAG_BASE) pyproject=$PYPROJECT __init__=$INIT"
          [ "$TAG_BASE" = "$PYPROJECT" ] || { echo "tag base $TAG_BASE != pyproject $PYPROJECT" >&2; exit 1; }
          [ "$TAG_BASE" = "$INIT" ]      || { echo "tag base $TAG_BASE != __init__ $INIT"      >&2; exit 1; }

      - name: Build sdist + wheel
        working-directory: packages/python
        run: uv build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: packages/python/dist
          print-hash: true
