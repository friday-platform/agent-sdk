name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript (vp check + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
      - run: vp check
      - run: vp test --passWithNoTests

  python:
    name: Python ${{ matrix.python-version }} (ruff + pytest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Tracks https://devguide.python.org/versions/ — every Python receiving
        # upstream support that satisfies pyproject `requires-python = ">=3.12"`.
        python-version: ["3.12", "3.13", "3.14"]
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --all-extras --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest
